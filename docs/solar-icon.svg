<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f1a"/>
      <stop offset="100%" style="stop-color:#0d1a0d"/>
    </linearGradient>
    <linearGradient id="sol" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Rayos del sol (8 rayos) -->
  <g transform="translate(256, 185)" filter="url(#glow-soft)">
    <line x1="0" y1="-95" x2="0" y2="-70" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="-95" x2="0" y2="-70" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="rotate(45)"/>
    <line x1="0" y1="-95" x2="0" y2="-70" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="rotate(90)"/>
    <line x1="0" y1="-95" x2="0" y2="-70" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="rotate(135)"/>
    <line x1="0" y1="-95" x2="0" y2="-70" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="rotate(180)"/>
    <line x1="0" y1="-95" x2="0" y2="-70" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="rotate(225)"/>
    <line x1="0" y1="-95" x2="0" y2="-70" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="rotate(270)"/>
    <line x1="0" y1="-95" x2="0" y2="-70" stroke="#FFD700" stroke-width="8" stroke-linecap="round" opacity="0.9" transform="rotate(315)"/>
  </g>

  <!-- Círculo del sol -->
  <circle cx="256" cy="185" r="52" fill="url(#sol)" filter="url(#glow)"/>
  <!-- Brillo interior -->
  <circle cx="240" cy="170" r="16" fill="white" opacity="0.25"/>

  <!-- Panel solar (3 columnas x 2 filas) -->
  <g transform="translate(108, 300)">
    <!-- Marco exterior del panel -->
    <rect x="0" y="0" width="296" height="140" rx="8" fill="#1e3a5f" opacity="0.8"/>

    <!-- Celda 1,1 -->
    <rect x="8" y="8" width="88" height="58" rx="4" fill="url(#panel)"/>
    <!-- Celda 1,2 -->
    <rect x="104" y="8" width="88" height="58" rx="4" fill="url(#panel)"/>
    <!-- Celda 1,3 -->
    <rect x="200" y="8" width="88" height="58" rx="4" fill="url(#panel)"/>
    <!-- Celda 2,1 -->
    <rect x="8" y="74" width="88" height="58" rx="4" fill="url(#panel)"/>
    <!-- Celda 2,2 -->
    <rect x="104" y="74" width="88" height="58" rx="4" fill="url(#panel)"/>
    <!-- Celda 2,3 -->
    <rect x="200" y="74" width="88" height="58" rx="4" fill="url(#panel)"/>

    <!-- Líneas de celda fila 1 -->
    <line x1="8" y1="37" x2="96" y2="37" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="52" y1="8" x2="52" y2="66" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="104" y1="37" x2="192" y2="37" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="148" y1="8" x2="148" y2="66" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="37" x2="288" y2="37" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="244" y1="8" x2="244" y2="66" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>

    <!-- Líneas de celda fila 2 -->
    <line x1="8" y1="103" x2="96" y2="103" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="52" y1="74" x2="52" y2="132" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="104" y1="103" x2="192" y2="103" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="148" y1="74" x2="148" y2="132" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="103" x2="288" y2="103" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
    <line x1="244" y1="74" x2="244" y2="132" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>

    <!-- Reflejo en panel -->
    <rect x="8" y="8" width="280" height="30" rx="4" fill="white" opacity="0.05"/>
  </g>

  <!-- Rayo de energía (símbolo €/⚡ pequeño) -->
  <text x="256" y="185" text-anchor="middle" dominant-baseline="central" 
        font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="white" opacity="0.9" filter="url(#glow-soft)">⚡</text>
</svg>
