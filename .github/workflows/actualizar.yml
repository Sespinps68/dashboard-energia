name: Actualizar datos energía

on:
  schedule:
    # Se ejecuta todos los días a las 6:00 de la mañana hora España.
    # GitHub Actions usa UTC. España está en UTC+2 en horario de verano (~marzo-octubre)
    # y UTC+1 en horario de invierno. Con "0 4 * * *" (4:00 UTC):
    #   - Verano: 4:00 UTC = 6:00 en España ✅
    #   - Invierno: 4:00 UTC = 5:00 en España (se adelanta 1h, no se atrasa)
    - cron: "0 4 * * *"
  workflow_dispatch: {}  # Esto permite también ejecutarlo a mano desde GitHub si quieres probarlo

permissions:
  contents: write  # Necesario para que el script pueda guardar cambios en el repositorio

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de actualización
        env:
          DATADIS_NIF: ${{ secrets.DATADIS_NIF }}
          DATADIS_PASSWORD: ${{ secrets.DATADIS_PASSWORD }}
          DATADIS_CUPS: ${{ secrets.DATADIS_CUPS }}
        run: python actualizar_datos.py

      - name: Guardar cambios en el repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/historico.csv
          git diff --staged --quiet || git commit -m "Actualización automática de datos"
          git push
