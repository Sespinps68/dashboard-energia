name: Actualizar datos energía

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de actualización
        env:
          DATADIS_NIF: ${{ secrets.DATADIS_NIF }}
          DATADIS_PASSWORD: ${{ secrets.DATADIS_PASSWORD }}
          ESIOS_TOKEN: ${{ secrets.ESIOS_TOKEN }}
        run: python actualizar_datos.py

      - name: Guardar cambios en el repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/historico.csv
          git diff --staged --quiet || git commit -m "Actualización automática de datos"
          git push
